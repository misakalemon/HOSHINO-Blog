<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- HarmonyOS 风格图标 (圆角/极简/线条) -->

  <!-- 首页 -->
  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 博客 -->
  <symbol id="icon-blog" viewBox="0 0 24 24">
    <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 关于 -->
  <symbol id="icon-about" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M12 17v-6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="8" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- 联系 -->
  <symbol id="icon-contact" viewBox="0 0 24 24">
    <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 搜索 -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M15 15l5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- 写文章/编辑 -->
  <symbol id="icon-write" viewBox="0 0 24 24">
    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 评论 -->
  <symbol id="icon-comment" viewBox="0 0 24 24">
    <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 分类 -->
  <symbol id="icon-category" viewBox="0 0 24 24">
    <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 用户 -->
  <symbol id="icon-user" viewBox="0 0 24 24">
    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- RSS -->
  <symbol id="icon-rss" viewBox="0 0 24 24">
    <path d="M5 19a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.8" fill="currentColor"/>
    <path d="M4 4a16 16 0 0116 16M4 11a9 9 0 019 9" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- 箭头左 -->
  <symbol id="icon-arrow-left" viewBox="0 0 24 24">
    <path d="M19 12H5m7-7l-7 7 7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 箭头右 -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24">
    <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Twitter -->
  <symbol id="icon-twitter" viewBox="0 0 24 24">
    <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- GitHub -->
  <symbol id="icon-github" viewBox="0 0 24 24">
    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 日期 -->
  <symbol id="icon-calendar" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- 作者 -->
  <symbol id="icon-author" viewBox="0 0 24 24">
    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
  </symbol>

  <!-- 关闭 -->
  <symbol id="icon-close" viewBox="0 0 24 24">
    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 检查/勾 -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 链接 -->
  <symbol id="icon-link" viewBox="0 0 24 24">
    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
