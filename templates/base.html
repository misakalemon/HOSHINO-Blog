<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_name|default('HOSHINO Blog') }}{% endblock %}</title>
    <meta name="description" content="{% block description %}个人博客{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tech.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo/favicon.svg') }}">
    <style>
      /* 如果没有外网字体，退化为系统字体 */
      .post-content { font-family: 'Inter', system-ui, sans-serif; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- SVG 图标库 (HarmonyOS 风格) -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-blog" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-about" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M12 17v-6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="12" cy="8" r="0.8" fill="currentColor"/></symbol>
  <symbol id="icon-contact" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M15 15l5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></symbol>
  <symbol id="icon-write" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-comment" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-rss" viewBox="0 0 24 24"><path d="M5 19a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.8" fill="currentColor"/><path d="M4 4a16 16 0 0116 16M4 11a9 9 0 019 9" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></symbol>
  <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5m7-7l-7 7 7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></symbol>
  <symbol id="icon-author" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/></symbol>
  <symbol id="icon-twitter" viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-github" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
</svg>

<!-- 导航栏 -->
<nav class="navbar">
    <div class="navbar-inner">
            <a href="{{ url_for('blog.index') }}" class="navbar-logo">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:6px"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke="var(--accent-cyan)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span style="vertical-align:middle">HOSHINO</span>
            </a>
        <div class="navbar-links">
            <a href="{{ url_for('blog.index') }}">
              <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-home"/></svg>
              首页
            </a>
            <a href="{{ url_for('blog.index') }}">
              <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-blog"/></svg>
              博客
            </a>
            <a href="{{ url_for('blog.about') }}">
              <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-about"/></svg>
              关于
            </a>
            <a href="{{ url_for('blog.contact') }}">
              <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-contact"/></svg>
              联系
            </a>
            <a href="{{ url_for('admin.new_post') }}" class="nav-write-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-write"/></svg>
              写文章
            </a>
            <form class="search-form" action="{{ url_for('blog.search') }}" method="GET">
                <input type="text" name="q" placeholder="搜索..." required>
                <button type="submit">
                  <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle"><use href="#icon-search"/></svg>
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- 页面内容 -->
{% block content %}{% endblock %}

<!-- 页脚 -->
<footer class="footer">
    <div class="container">
        <p>&copy; {{ now().year if now else '2026' }} HOSHINO Blog · 保留所有权利</p>
        <div class="social-links">
            <a href="#" title="Twitter">
              <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:middle"><use href="#icon-twitter"/></svg>
            </a>
            <a href="#" title="GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:middle"><use href="#icon-github"/></svg>
            </a>
            <a href="{{ url_for('blog.rss_feed') }}" title="RSS">
              <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:middle"><use href="#icon-rss"/></svg>
            </a>
        </div>
    </footer>

</body>
</html>
