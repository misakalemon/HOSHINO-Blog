<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_name|default('Hoshino') }}{% endblock %}</title>
    <meta name="description" content="{% block description %}Hoshino Blog{% endblock %}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glow-design.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo/favicon.svg') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- 背景光晕 -->
<div class="glow-bg">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
</div>

<!-- 导航栏 -->
<nav class="navbar">
    <div style="display:flex;align-items:center;gap:16px">
        <button class="nav-toggle" id="navToggle" onclick="toggleNav()" style="display:none;flex-direction:column;gap:4px;cursor:pointer;background:none;border:none;padding:4px" aria-label="菜单">
            <span style="display:block;width:20px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;transition:all 0.3s"></span>
            <span style="display:block;width:20px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;transition:all 0.3s"></span>
            <span style="display:block;width:20px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;transition:all 0.3s"></span>
        </button>
        <a href="{{ url_for('blog.index') }}" class="nav-logo">✦ Hoshino <span style="font-size:0.65rem;font-weight:400;background:linear-gradient(135deg,#ff8aae,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.08em">—— 星野、参上！——</span></a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="{{ url_for('blog.index') }}" {% if request.endpoint == 'blog.index' or request.endpoint == 'blog.category' %}class="nav-link-active"{% endif %}>博客</a>
        <a href="{{ url_for('blog.about') }}" {% if request.endpoint == 'blog.about' %}class="nav-link-active"{% endif %}>关于</a>
        <a href="{{ url_for('blog.contact') }}" {% if request.endpoint == 'blog.contact' %}class="nav-link-active"{% endif %}>联系</a>
        <a href="{{ url_for('price.index') }}" {% if request.endpoint and 'price' in request.endpoint %}class="nav-link-active"{% endif %}>价格</a>
        <a href="{{ url_for('blog.tools') }}" {% if request.endpoint == 'blog.tools' %}class="nav-link-active"{% endif %}>工具</a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('admin.new_post') }}" class="nav-write-btn">写文章</a>
        {% endif %}
    </div>
</nav>

<!-- 移动端导航遮罩 -->
<div class="nav-overlay" id="navOverlay" onclick="toggleNav()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999"></div>

<!-- 页面内容 -->
{% block content %}{% endblock %}

<!-- 页脚 -->
<footer class="footer">
    <span>&copy; {{ now().year if now else '2026' }} Hoshino</span>
    <span>
        <a href="#" title="Twitter">Twitter</a>
        <a href="#" title="GitHub">GitHub</a>
        <a href="{{ url_for('blog.rss_feed') }}" title="RSS">RSS</a>
    </span>
</footer>

<script src="{{ url_for('static', filename='js/glow-controller.js') }}"></script>
</body>
</html>
