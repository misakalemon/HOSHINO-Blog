<!-- ============================================================
     用户新建/编辑表单 (admin/user-form.html)
     用途：管理员创建或编辑用户（编辑模式仅角色可改）
     继承：admin/base_admin.html
     ============================================================ -->
{% extends 'admin/base_admin.html' %}
{% block admin_content %}
<div class="admin-header">
    <h3>{{ '编辑' if editing else '新建' }}用户</h3>
    <a href="{{ url_for('admin.user_list') }}" class="btn btn-ghost">← 返回</a>
</div>
<div class="admin-card">
    <form method="POST">
        {{ form.hidden_tag() }}
        <div class="form-group"><label>用户名</label><input type="text" name="username" value="{{ form.username.data or '' }}" {{ 'readonly' if editing else 'required' }}></div>
        <div class="form-group"><label>邮箱</label><input type="email" name="email" value="{{ form.email.data or '' }}" {{ 'readonly' if editing else 'required' }}></div>
        {% if editing %}
        <!-- 编辑模式：不显示密码字段 -->
        {% else %}
        <div class="form-group"><label>密码</label><input type="password" name="password" required></div>
        {% endif %}
        <div class="form-group"><label>显示名</label><input type="text" name="display_name" value="{{ form.display_name.data or '' }}" {{ 'readonly' if editing else '' }}></div>
        <div class="form-group"><label>个人简介</label><textarea name="bio" rows="3" {{ 'readonly' if editing else '' }}>{{ form.bio.data or '' }}</textarea></div>
        <div class="form-group"><label>个人网站</label><input type="url" name="website" value="{{ form.website.data or '' }}" placeholder="https://" {{ 'readonly' if editing else '' }}></div>
        <div class="form-group"><label>角色</label>
            <div class="glow-select-wrap">
                <div class="glow-select-trigger" onclick="toggleGlowSelect(this)">
                    <span class="glow-select-value">{{ form.role.label.text if form.role.data else '用户' }}</span>
                    <span class="glow-select-arrow">▼</span>
                </div>
                <select name="role" style="display:none">
                    <option value="user" {% if form.role.data == 'user' %}selected{% endif %}>用户</option>
                    <option value="editor" {% if form.role.data == 'editor' %}selected{% endif %}>编辑</option>
                    <option value="admin" {% if form.role.data == 'admin' %}selected{% endif %}>管理员</option>
                </select>
                <div class="glow-select-menu">
                    <div class="glow-select-option{% if form.role.data == 'user' %} is-selected{% endif %}" data-value="user">用户</div>
                    <div class="glow-select-option{% if form.role.data == 'editor' %} is-selected{% endif %}" data-value="editor">编辑</div>
                    <div class="glow-select-option{% if form.role.data == 'admin' %} is-selected{% endif %}" data-value="admin">管理员</div>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">{{ '更新' if editing else '创建' }}</button>
    </form>
</div>
{% endblock %}
