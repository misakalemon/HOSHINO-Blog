<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}管理后台{% endblock %} · HOSHINO Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tech.css') }}">
    {% block extra_head %}{% endblock %}
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-sans);
        display: flex;
        min-height: 100vh;
      }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<button class="admin-toggle" id="adminToggle" onclick="toggleAdminSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="admin-overlay" id="adminOverlay" onclick="toggleAdminSidebar()"></div>
<div class="admin-sidebar" id="adminSidebar">
    <a href="{{ url_for('admin.dashboard') }}" class="logo">// HOSHINO</a>
    <a href="{{ url_for('admin.dashboard') }}" {% if request.endpoint == 'admin.dashboard' %}class="active"{% endif %}>📊 仪表盘</a>
    <a href="{{ url_for('admin.post_list') }}" {% if request.endpoint and 'post' in request.endpoint %}class="active"{% endif %}>📝 文章</a>
    <a href="{{ url_for('admin.category_list') }}" {% if request.endpoint and 'category' in request.endpoint %}class="active"{% endif %}>🏷️ 分类</a>
    <a href="{{ url_for('admin.comment_list') }}" {% if request.endpoint and 'comment' in request.endpoint %}class="active"{% endif %}>💬 评论</a>
    <a href="{{ url_for('admin.user_list') }}" {% if request.endpoint and 'user' in request.endpoint %}class="active"{% endif %}>👥 用户</a>
    <a href="{{ url_for('admin.profile') }}" {% if request.endpoint == 'admin.profile' %}class="active"{% endif %}>👤 个人资料</a>
    <a href="{{ url_for('blog.index') }}" style="color:var(--text-muted);margin-top:20px">🌐 查看网站</a>
    <a href="{{ url_for('admin.logout') }}" class="logout-link">✕ 退出登录</a>
</div>

<!-- 主内容 -->
<div class="admin-main">
    <div class="admin-container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for cat, msg in msgs %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block admin_content %}{% endblock %}
    </div>
</div>

<script>
function toggleAdminSidebar() {
  document.getElementById('adminToggle').classList.toggle('open');
  document.getElementById('adminSidebar').classList.toggle('open');
  document.getElementById('adminOverlay').classList.toggle('show');
}
</script>

</body>
</html>
