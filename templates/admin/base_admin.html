<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}管理后台{% endblock %} · Hoshino</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glow-design.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>

<div class="glow-bg">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
</div>

<!-- 侧边栏 -->
<button class="admin-toggle" id="adminToggle" onclick="toggleAdminSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="admin-overlay" id="adminOverlay" onclick="toggleAdminSidebar()"></div>
<div class="admin-sidebar" id="adminSidebar">
    <a href="{{ url_for('admin.dashboard') }}" class="logo">✦ Hoshino</a>
    <a href="{{ url_for('admin.dashboard') }}" {% if request.endpoint == 'admin.dashboard' %}class="active"{% endif %}>仪表盘</a>
    <a href="{{ url_for('admin.post_list') }}" {% if request.endpoint and 'post' in request.endpoint %}class="active"{% endif %}>文章</a>
    <a href="{{ url_for('admin.category_list') }}" {% if request.endpoint and 'category' in request.endpoint %}class="active"{% endif %}>分类</a>
    <a href="{{ url_for('admin.featured_card_list') }}" {% if request.endpoint and 'featured_card' in request.endpoint %}class="active"{% endif %}>特色卡片</a>
    <a href="{{ url_for('admin.comment_list') }}" {% if request.endpoint and 'comment' in request.endpoint %}class="active"{% endif %}>评论</a>
    <a href="{{ url_for('admin.user_list') }}" {% if request.endpoint and 'user' in request.endpoint %}class="active"{% endif %}>用户</a>
    <a href="{{ url_for('admin.profile') }}" {% if request.endpoint == 'admin.profile' %}class="active"{% endif %}>个人资料</a>
    <a href="{{ url_for('blog.index') }}" style="color:rgba(255,255,255,0.25);margin-top:20px;font-size:0.75rem">← 查看网站</a>
    <a href="{{ url_for('admin.logout') }}" class="logout-link">退出登录</a>
</div>

<!-- 主内容 -->
<div class="admin-main">
    <div class="admin-container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for cat, msg in msgs %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block admin_content %}{% endblock %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/glow-controller.js') }}"></script>
</body>
</html>
