<!-- ============================================================
     管理后台基础布局 (admin/base_admin.html)
     用途：管理后台所有页面的 HTML 骨架，含侧边栏导航和 Flash 消息
     定义块：
       - title         : 页面标题（默认"管理后台"）
       - extra_head    : 头部额外标签
       - admin_content : 后台页面主体内容（子模板填充）
     模板变量：
       - request.endpoint : 当前路由端点（用于侧边栏高亮）
       - get_flashed_messages : Flask Flash 消息
     ============================================================ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}管理后台{% endblock %} · Hoshino</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glow-design.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>


<!-- 侧边栏导航 -->
<button class="admin-toggle" id="adminToggle" onclick="toggleAdminSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="admin-overlay" id="adminOverlay" onclick="toggleAdminSidebar()"></div>
<div class="admin-sidebar" id="adminSidebar">
    <a href="{{ url_for('admin.dashboard') }}" class="logo">✦ Hoshino</a>
    <!-- 根据 request.endpoint 匹配高亮 -->
    <a href="{{ url_for('admin.dashboard') }}" {% if request.endpoint == 'admin.dashboard' %}class="active"{% endif %}><i class="hm-public-home"></i>仪表盘</a>
    <a href="{{ url_for('admin.post_list') }}" {% if request.endpoint and 'post' in request.endpoint %}class="active"{% endif %}><i class="hm-public-file"></i>文章</a>
    <a href="{{ url_for('admin.category_list') }}" {% if request.endpoint and 'category' in request.endpoint %}class="active"{% endif %}><i class="hm-folder"></i>分类</a>
    <a href="{{ url_for('admin.featured_card_list') }}" {% if request.endpoint and 'featured_card' in request.endpoint %}class="active"{% endif %}><i class="hm-public-highlights"></i>特色卡片</a>
    <a href="{{ url_for('admin.comment_list') }}" {% if request.endpoint and 'comment' in request.endpoint %}class="active"{% endif %}><i class="hm-comments"></i>评论</a>
    <a href="{{ url_for('admin.user_list') }}" {% if request.endpoint and 'user' in request.endpoint %}class="active"{% endif %}><i class="hm-contacts"></i>用户</a>
    <a href="{{ url_for('admin.profile') }}" {% if request.endpoint == 'admin.profile' %}class="active"{% endif %}><i class="hm-set"></i>个人资料</a>
    <a href="{{ url_for('blog.index') }}" style="color:rgba(255,255,255,0.25);margin-top:20px;font-size:0.75rem">← 查看网站</a>
    <a href="{{ url_for('admin.logout') }}" class="logout-link"><i class="hm-quit"></i>退出登录</a>
</div>

<!-- 主内容区 -->
<div class="admin-main">
    <div class="admin-container">
    <!-- Flash 消息：遍历所有消息并显示 -->
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for cat, msg in msgs %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- admin_content 块：子模板填充 -->
    {% block admin_content %}{% endblock %}
    </div>
</div>


</body>
</html>
