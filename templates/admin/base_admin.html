<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}管理后台{% endblock %} · HOSHINO Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tech.css') }}">
    {% block extra_head %}{% endblock %}
    <style>
      /* Admin 专用扩展 — 复用 frontend 的暗色科技变量 */
      :root {
        --sidebar-w: 240px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        min-height: 100vh;
      }

      /* --- 侧边栏 --- */
      .admin-sidebar {
        width: var(--sidebar-w);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-subtle);
        padding: 24px 16px;
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        overflow-y: auto;
        z-index: 100;
      }
      .admin-sidebar .logo {
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 28px;
        display: block;
      }
      .admin-sidebar .section-title {
        color: var(--text-muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 20px 0 8px;
        padding-left: 12px;
      }
      .admin-sidebar a {
        display: block;
        color: var(--text-secondary);
        padding: 10px 12px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
        margin-bottom: 2px;
      }
      .admin-sidebar a:hover { background: rgba(255,255,255,0.04); color: #fff; }
      .admin-sidebar a.active {
        background: rgba(0,240,255,0.08);
        color: var(--accent-cyan);
        border-left: 2px solid var(--accent-cyan);
      }
      .admin-sidebar .logout-link { color: var(--accent-pink) !important; margin-top: 12px; }
      .admin-sidebar .logout-link:hover { background: rgba(255,45,120,0.08) !important; }

      /* --- 主区域 --- */
      .admin-main {
        margin-left: var(--sidebar-w);
        flex: 1;
        padding: 28px 32px;
        min-height: 100vh;
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
      }
      .admin-header h3 {
        font-size: 22px;
        font-weight: 700;
        color: #e8edf5;
      }

      /* --- Flash 消息 --- */
      .flash {
        padding: 12px 16px;
        border-radius: var(--radius);
        margin-bottom: 20px;
        font-size: 13px;
      }
      .flash.success {
        background: rgba(0,255,136,0.1);
        border: 1px solid var(--accent-green);
        color: var(--accent-green);
      }
      .flash.error {
        background: rgba(255,45,120,0.1);
        border: 1px solid var(--accent-pink);
        color: var(--accent-pink);
      }

      /* --- 卡片 --- */
      .admin-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 20px;
      }
      .admin-card h5 {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent-cyan);
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        text-align: center;
        padding: 28px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        transition: all 0.3s;
      }
      .stat-card:hover {
        border-color: var(--accent-cyan);
        box-shadow: 0 0 24px rgba(0,240,255,0.08);
      }
      .stat-card .num {
        font-size: 36px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .stat-card .label {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* --- 表格 --- */
      .admin-table { width: 100%; border-collapse: collapse; }
      .admin-table th {
        padding: 12px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-subtle);
      }
      .admin-table td {
        padding: 12px 14px;
        font-size: 14px;
        color: var(--text-secondary);
        border-bottom: 1px solid rgba(255,255,255,0.03);
      }
      .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
      .admin-table td a { color: var(--accent-cyan); font-weight: 500; }
      .admin-table td a:hover { color: #fff; }

      /* --- 状态徽章 --- */
      .badge {
        display: inline-block;
        padding: 4px 16px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        min-width: 60px;
        text-align: center;
      }
      .badge-published, .badge-approved, .badge-admin {
        background: rgba(0,255,136,0.12);
        color: var(--accent-green);
        border: 1px solid rgba(0,255,136,0.2);
      }
      .badge-draft, .badge-user {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.08);
      }
      .badge-pending {
        background: rgba(255,45,120,0.12);
        color: var(--accent-pink);
        border: 1px solid rgba(255,45,120,0.2);
      }

      /* --- 按钮 (复用 tech.css 的 .btn, .btn-primary) --- */
      .btn-danger {
        background: rgba(255,45,120,0.1);
        border: 1px solid rgba(255,45,120,0.2);
        color: var(--accent-pink);
      }
      .btn-danger:hover {
        background: var(--accent-pink);
        color: #fff;
        box-shadow: 0 0 16px rgba(255,45,120,0.3);
      }
      .btn-sm { padding: 6px 14px; font-size: 12px; }

      /* --- 表单 (复用 .form-group, 微调) --- */
      .admin-card .form-group label {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .admin-card .form-group input[type=checkbox] {
        width: auto;
        accent-color: var(--accent-cyan);
        margin-right: 6px;
      }

      .admin-row { display: flex; gap: 16px; flex-wrap: wrap; }
      .admin-row > * { flex: 1; min-width: 200px; }

      /* 管理后台汉堡菜单按钮 */
      .admin-toggle {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        background: rgba(10,10,26,0.6);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 10px;
        z-index: 10000;
        position: fixed;
        top: 10px;
        left: 10px;
      }
      .admin-toggle span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--text-primary);
        border-radius: 2px;
        transition: all 0.3s;
      }
      .admin-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
      .admin-toggle.open span:nth-child(2) { opacity: 0; }
      .admin-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

      /* 遮罩层 */
      .admin-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 9998;
      }
      .admin-overlay.show { display: block; }

      /* --- 响应式 (手机端卡片布局) --- */
      @media (max-width: 768px) {
        :root { --sidebar-w: 0px; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        .admin-toggle { display: flex !important; }
        .admin-sidebar {
          display: block; position: fixed; left: -280px; width: 260px;
          height: 100vh; z-index: 9999; padding-top: 60px;
          transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
          box-shadow: 4px 0 30px rgba(0,0,0,0.4);
        }
        .admin-sidebar.open { left: 0; }
        .admin-sidebar a { font-size: 15px; padding: 14px 20px; color: #d0d8e8; }
        .admin-sidebar a:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .admin-sidebar .section-title { font-size: 11px; padding-left: 20px; }
        
        /* 主内容 */
        .admin-main { margin-left: 0; padding: 16px; max-width: 100vw; }
        .admin-container { max-width: 100%; margin: 0 auto; padding: 0; }
        .admin-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 6px; padding: 0 0 0 44px; margin-bottom: 16px; }
        .admin-header h3 { font-size: 17px; margin: 0; flex: 1; text-align: center; }
        .admin-header .btn { flex-shrink: 0; }
        
        /* 统计卡片网格 */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .stat-card { padding: 14px 8px; text-align: center; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
        .stat-card .num { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        
        /* ===== 表格 → 卡片列表 ===== */
        /* 隐藏表头 */
        .admin-table thead { display: none; }
        /* 每一行变成独立卡片 */
        .admin-table, .admin-table tbody, .admin-table tr { display: block; width: 100%; }
        .admin-table tr {
          background: var(--bg-card);
          border: 1px solid var(--border-subtle);
          border-radius: 14px;
          padding: 16px;
          margin-bottom: 10px;
          display: flex;
          flex-wrap: wrap;
          align-items: flex-start;
          gap: 4px;
        }
        /* 每个单元格变成标签+值行 */
        .admin-table td {
          display: flex;
          font-size: 13px;
          padding: 4px 0;
          border: none;
          color: var(--text-secondary);
          flex: 1 1 100%;
          overflow: hidden;
          text-overflow: ellipsis;
          align-items: baseline;
        }
        /* 用 data-label 属性显示字段标签 */
        .admin-table td::before {
          content: attr(data-label);
          display: inline-block;
          font-size: 10px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          color: var(--text-muted);
          margin-right: 8px;
          min-width: 56px;
          flex-shrink: 0;
        }
        /* 操作列单独处理 - 全宽按钮行 */
        .admin-table td:last-child {
          flex: 1 1 100%;
          display: flex;
          gap: 8px;
          padding-top: 12px;
          margin-top: 8px;
          border-top: 1px solid var(--border-subtle);
          justify-content: stretch;
        }
        .admin-table td:last-child::before { display: none; }
        .admin-table td:last-child .btn { flex: 1; text-align: center; justify-content: center; padding: 10px !important; font-size: 13px !important; }
        
        /* 空状态显示 */
        .admin-table tr[style*="color:var(--text-muted)"] { display: block; text-align: center; padding: 20px; color: var(--text-muted) !important; }
        
        /* 按钮 */
        .btn { font-size: 13px; padding: 8px 14px; }
        .btn-sm { font-size: 12px; padding: 6px 12px; }
        
        /* 表单 */
        .form-group label { font-size: 12px; }
        .form-group input, .form-group select, .form-group textarea { font-size: 14px; padding: 10px 12px; }
        
        .admin-row { flex-direction: column; }
        .steps { flex-direction: column; gap: 4px; }
        .step { padding: 10px; font-size: 13px; }
        #rte-toolbar { overflow-x: auto; flex-wrap: nowrap; }
      }
    /* 统一后台页面宽度 */
    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<button class="admin-toggle" id="adminToggle" onclick="toggleAdminSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="admin-overlay" id="adminOverlay" onclick="toggleAdminSidebar()"></div>
<div class="admin-sidebar" id="adminSidebar">
    <a href="{{ url_for('admin.dashboard') }}" class="logo">// HOSHINO</a>
    <a href="{{ url_for('admin.dashboard') }}" {% if request.endpoint == 'admin.dashboard' %}class="active"{% endif %}>📊 仪表盘</a>
    <a href="{{ url_for('admin.post_list') }}" {% if request.endpoint and 'post' in request.endpoint %}class="active"{% endif %}>📝 文章</a>
    <a href="{{ url_for('admin.category_list') }}" {% if request.endpoint and 'category' in request.endpoint %}class="active"{% endif %}>🏷️ 分类</a>
    <a href="{{ url_for('admin.comment_list') }}" {% if request.endpoint and 'comment' in request.endpoint %}class="active"{% endif %}>💬 评论</a>
    <a href="{{ url_for('admin.user_list') }}" {% if request.endpoint and 'user' in request.endpoint %}class="active"{% endif %}>👥 用户</a>
    <a href="{{ url_for('admin.profile') }}" {% if request.endpoint == 'admin.profile' %}class="active"{% endif %}>👤 个人资料</a>
    <a href="{{ url_for('blog.index') }}" style="color:var(--text-muted);margin-top:20px">🌐 查看网站</a>
    <a href="{{ url_for('admin.logout') }}" class="logout-link">✕ 退出登录</a>
</div>

<!-- 主内容 -->
<div class="admin-main">
    <div class="admin-container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for cat, msg in msgs %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block admin_content %}{% endblock %}
    </div>
</div>

<script>
function toggleAdminSidebar() {
  document.getElementById('adminToggle').classList.toggle('open');
  document.getElementById('adminSidebar').classList.toggle('open');
  document.getElementById('adminOverlay').classList.toggle('show');
}
</script>











<!-- === 卡片追光（后台版） === -->
<script>
(function() {
    var cards = [];
    var mouseX = -9999, mouseY = -9999, hovering = false, frameId = null;

    window.addEventListener('mousemove', function(e) {
        mouseX = e.clientX; mouseY = e.clientY; hovering = true;
        if (!frameId) frameId = requestAnimationFrame(draw);
    });
    window.addEventListener('mouseleave', function() {
        hovering = false;
        if (!frameId) frameId = requestAnimationFrame(draw);
    });

    // === 滚动时更新卡片位置，让追光跟随鼠标而非页面 ===
    window.addEventListener('scroll', function() {
        for (var i = 0; i < cards.length; i++) cards[i].dirty = true;
        if (!frameId) frameId = requestAnimationFrame(draw);
    }, { passive: true });

    function draw() {
        frameId = null;
        for (var i = 0; i < cards.length; i++) {
            var s = cards[i];
            var mx = hovering ? mouseX : -9999;
            var my = hovering ? mouseY : -9999;

            if (s.dirty) {
                var r = s.card.getBoundingClientRect();
                s.rect = r;
                var br = parseFloat(getComputedStyle(s.card).borderRadius) || 12;
                var perimeter = Math.max(0, r.width-2*br) + Math.max(0, r.height-2*br) + Math.max(0, r.width-2*br) + Math.max(0, r.height-2*br) + 2*Math.PI*br;
                var n = Math.max(180, Math.round(perimeter * 0.52));
                var step = perimeter / n;
                s.pts = [];
                for (var k = 0; k < n; k++) {
                    var d = k * step, x, y;
                    var ts = Math.max(0, r.width-2*br), rs = Math.max(0, r.height-2*br), bs = Math.max(0, r.width-2*br), ls = Math.max(0, r.height-2*br), qc = Math.PI/2*br;
                    if (d < ts) { x = br+d; y = 0; }
                    else { d -= ts;
                        if (d < qc) { var a = -Math.PI/2 + d/qc*Math.PI/2; x = (r.width-br)+br*Math.cos(a); y = br+br*Math.sin(a); }
                        else { d -= qc;
                            if (d < rs) { x = r.width; y = br+d; }
                            else { d -= rs;
                                if (d < qc) { var a2 = d/qc*Math.PI/2; x = (r.width-br)+br*Math.cos(a2); y = (r.height-br)+br*Math.sin(a2); }
                                else { d -= qc;
                                    if (d < bs) { x = (r.width-br)-d; y = r.height; }
                                    else { d -= bs;
                                        if (d < qc) { var a3 = Math.PI/2 + d/qc*Math.PI/2; x = br+br*Math.cos(a3); y = (r.height-br)+br*Math.sin(a3); }
                                        else { d -= qc;
                                            if (d < ls) { x = 0; y = (r.height-br)-d; }
                                            else { d -= ls;
                                                if (d <= qc) { var a4 = Math.PI + d/qc*Math.PI/2; x = br+br*Math.cos(a4); y = br+br*Math.sin(a4); }
                                                else { x = br; y = 0; }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    s.pts.push({x:x, y:y});
                }
                var dpr = window.devicePixelRatio || 1;
                s.cw = r.width + 70;
                s.ch = r.height + 70;
                s.canvas.width = s.cw * dpr;
                s.canvas.height = s.ch * dpr;
                s.canvas.style.width = s.cw + 'px';
                s.canvas.style.height = s.ch + 'px';
                s.ctx.setTransform(1,0,0,1,0,0);
                s.ctx.scale(dpr, dpr);
                s.dirty = false;
            }

            if (!s.rect || !s.pts || s.pts.length === 0) continue;
            s.ctx.clearRect(0, 0, s.cw, s.ch);
            if (!hovering) continue;

            var ex = mx - s.rect.left;
            var ey = my - s.rect.top;
            var gc = ['145,205,248','138,198,242','155,212,252','142,202,246','148,208,250'][i % 5];
            for (var j = 0; j < s.pts.length; j++) {
                var p = s.pts[j];
                var dist = Math.hypot(p.x - ex, p.y - ey);
                if (dist >= 140) continue;
                var t = dist / 140;
                var intensity = (1 - Math.pow(t, 0.5)) * (1 - 0.022) + 0.022;
                var g = s.ctx.createRadialGradient(p.x+35, p.y+35, 0.2, p.x+35, p.y+35, 3.5);
                g.addColorStop(0, 'rgba('+gc+','+intensity+')');
                g.addColorStop(0.35, 'rgba('+gc+','+(intensity*0.78)+')');
                g.addColorStop(1, 'rgba('+gc+',0)');
                s.ctx.fillStyle = g;
                s.ctx.beginPath();
                s.ctx.arc(p.x+35, p.y+35, 3.5, 0, Math.PI*2);
                s.ctx.fill();
            }
        }
    }

    function init() {
        var els = document.querySelectorAll('.admin-card, .stat-card, .login-box');
        for (var i = 0; i < els.length; i++) {
            var card = els[i];
            if (card.querySelector('.cg-c')) continue;
            var canvas = document.createElement('canvas');
            canvas.className = 'cg-c';
            canvas.style.position = 'absolute';
            canvas.style.top = '-35px';
            canvas.style.left = '-35px';
            canvas.style.width = 'calc(100% + 70px)';
            canvas.style.height = 'calc(100% + 70px)';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '0';
            card.style.position = 'relative';
            card.insertBefore(canvas, card.firstChild);
            cards.push({
                card: card,
                canvas: canvas,
                ctx: canvas.getContext('2d'),
                rect: null,
                pts: [],
                dirty: true,
                cw: 0,
                ch: 0
            });
        }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>

</body>
</html>
