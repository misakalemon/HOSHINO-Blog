<div class="cookie-banner" id="cookieBanner">
    <span>本站使用 Cookie 来改善体验。<a href="{{ url_for('blog.about') }}" style="color:rgba(0,150,255,0.8);text-decoration:underline">了解更多</a></span>
    <button id="cookieConsentBtn">同意</button>
</div>
<script>
(function(){
  var b = document.getElementById('cookieBanner');
  if (!b) return;
  try { if (localStorage.getItem('cookie_consent')) { b.classList.add('is-hidden'); return; } } catch(e) {}
  function dismiss() {
    b.classList.add('is-hidden');
    try { localStorage.setItem('cookie_consent', '1'); } catch(e) {}
  }
  document.getElementById('cookieConsentBtn').onclick = dismiss;
  setTimeout(dismiss, 5000);
})();
</script>
