<div class="cookie-banner" id="cookieBanner" role="dialog" aria-label="Cookie 同意提示">
    <p class="cookie-text">本站使用 Cookie 来改善体验。<a href="{{ url_for('blog.about') }}" class="cookie-link">了解更多</a></p>
    <div class="cookie-actions">
        <button type="button" id="cookieRejectBtn" class="cookie-btn cookie-btn--secondary">拒绝</button>
        <button type="button" id="cookieConsentBtn" class="cookie-btn cookie-btn--primary">同意</button>
    </div>
</div>
<script>
(function(){
  var b = document.getElementById('cookieBanner');
  if (!b) return;
  try { if (localStorage.getItem('cookie_consent')) { b.classList.add('is-hidden'); return; } } catch(e) {}
  function accept() {
    b.classList.add('is-hidden');
    try { localStorage.setItem('cookie_consent', 'accepted'); } catch(e) {}
  }
  function reject() {
    b.classList.add('is-hidden');
    try { localStorage.setItem('cookie_consent', 'rejected'); } catch(e) {}
  }
  document.getElementById('cookieConsentBtn').onclick = accept;
  document.getElementById('cookieRejectBtn').onclick = reject;
  setTimeout(accept, 8000);
})();
</script>
