<div class="cookie-banner" id="cookieBanner" onclick="this.style.display='none';try{localStorage.setItem('cookie_consent','1')}catch(e){}">
    <span>本站使用 Cookie 来改善体验。<a href="{{ url_for('blog.about') }}" style="color:rgba(0,150,255,0.8);text-decoration:underline" onclick="event.stopPropagation()">了解更多</a></span>
    <button>同意</button>
</div>
<script>
try { if (localStorage.getItem('cookie_consent')) { document.getElementById('cookieBanner').style.display = 'none'; } } catch(e) {}
setTimeout(function(){ var b = document.getElementById('cookieBanner'); if (b && b.style.display !== 'none') { b.style.display = 'none'; try { localStorage.setItem('cookie_consent', '1'); } catch(e){} } }, 5000);
</script>
