{% extends 'admin/base_admin.html' %}
{% block title %}个人资料{% endblock %}
{% block admin_content %}
<div class="admin-header"><h3>个人资料</h3></div>
<div class="admin-card" style="max-width:600px">
    <form method="POST" enctype="multipart/form-data">
        {{ form.hidden_tag() }}

        <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border-subtle)">
            <div style="position:relative;flex-shrink:0">
                <img src="{{ url_for('blog.thumbnail', path=current_user.avatar or 'images/avatar/main-avatar.jpg', w=120) }}"
                     alt="avatar" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-purple)">
                <label for="avatarInput" style="position:absolute;bottom:-4px;right:-4px;width:28px;height:28px;border-radius:50%;background:var(--accent-cyan);color:#000;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:2px solid var(--bg-primary)">✎</label>
            </div>
            <div>
                <div style="font-weight:600;color:#fff;font-size:16px">{{ current_user.display_name or current_user.username }}</div>
                <div style="font-size:13px;color:var(--text-muted);margin-top:2px">{{ current_user.email }}</div>
            </div>
        </div>

        <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display:none" onchange="this.form.submit()">

        <div class="form-group"><label>显示名</label><input type="text" name="display_name" value="{{ form.display_name.data or '' }}"></div>
        <div class="form-group"><label>个人简介</label><textarea name="bio" rows="3">{{ form.bio.data or '' }}</textarea></div>
        <div class="form-group"><label>邮箱</label><input type="email" name="email" value="{{ form.email.data or '' }}"></div>
        <div class="form-group"><label>新密码（留空则保持当前密码）</label><input type="password" name="password"></div>
        <button type="submit" class="btn btn-primary">更新资料</button>
    </form>
</div>
{% endblock %}
