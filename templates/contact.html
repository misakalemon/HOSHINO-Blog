{% extends 'base.html' %}
{% block title %}联系我们 - HOSHINO Blog{% endblock %}
{% block content %}

<div class="page-header">
    <div class="container">
        <h1>联系我们</h1>
        <p>欢迎通过以下表单与我联系</p>
    </div>
</div>

<section style="padding-bottom:60px">
    <div class="container">
        <div class="row">
            <div class="col-8">
                <div class="page-content">
                    {% if message_sent %}
                    <div class="alert-success">消息已发送，感谢您的留言！</div>
                    {% endif %}

                    <form method="POST">
                        {{ form.hidden_tag() }}
                        <div class="form-group">
                            <input type="text" name="name" placeholder="您的姓名" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="邮箱" required>
                        </div>
                        <div class="form-group">
                            <textarea name="message" rows="6" placeholder="您的留言" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">发送消息</button>
                    </form>
                </div>
            </div>
            <div class="col-4">
                <aside class="sidebar">
                    {% include '_sidebar.html' %}
                </aside>
            </div>
        </div>
    </div>
</section>

{% endblock %}
