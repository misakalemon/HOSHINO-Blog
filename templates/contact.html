<!-- ============================================================
     联系页面 (contact.html)
     用途：展示联系表单，用户提交留言
     继承：base.html
     定义块：
       - title   : 页面标题
       - content : 页面主体内容
     模板变量：
       - message_sent  : 布尔值，消息是否已成功发送
       - form          : Flask-WTF 表单对象
     ============================================================ -->
{% extends 'base.html' %}
{% block title %}联系 - Hoshino{% endblock %}
{% block content %}

<section class="hero">
    <div style="margin-bottom:12px"><button onclick="history.back()" class="back-btn">← 返回</button></div>
    <h1><span class="highlight">联系</span></h1>
    <p>有任何问题或建议，欢迎留言</p>
</section>

<div class="content">
    <div class="row">
        <div class="col-8">
            <div class="page-content">
                <div class="glass-card" style="padding:24px">
                    <div class="card-content">
                        <!-- 如果消息发送成功，显示成功提示 -->
                        {% if message_sent %}
                        <div class="alert-success">消息已发送，感谢您的留言！</div>
                        {% endif %}

                        <!-- 联系表单 -->
                        <form method="POST">
                            <!-- CSRF 令牌 -->
                            {{ form.hidden_tag() }}
                            <div class="form-group">
                                <input type="text" name="name" placeholder="您的姓名" required>
                            </div>
                            <div class="form-group">
                                <input type="email" name="email" placeholder="邮箱" required>
                            </div>
                            <div class="form-group">
                                <textarea name="message" rows="6" placeholder="您的留言" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">发送消息</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- 侧边栏 -->
        <div class="col-4">
            <aside class="sidebar">
                {% include '_sidebar.html' %}
            </aside>
        </div>
    </div>
</div>

{% endblock %}
