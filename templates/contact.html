{% extends 'base.html' %}
{% block title %}联系 - Hoshino{% endblock %}
{% block content %}

<section class="hero">
    <h1><span class="highlight">联系</span></h1>
    <p>有任何问题或建议，欢迎留言</p>
</section>

<div class="content">
    <div class="row">
        <div class="col-8">
            <div class="page-content">
                <div class="glass-card" data-glow style="padding:24px">
                    <div class="card-content">
                        {% if message_sent %}
                        <div class="alert-success">消息已发送，感谢您的留言！</div>
                        {% endif %}

                        <form method="POST">
                            {{ form.hidden_tag() }}
                            <div class="form-group">
                                <input type="text" name="name" placeholder="您的姓名" required>
                            </div>
                            <div class="form-group">
                                <input type="email" name="email" placeholder="邮箱" required>
                            </div>
                            <div class="form-group">
                                <textarea name="message" rows="6" placeholder="您的留言" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">发送消息</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-4">
            <aside class="sidebar">
                {% include '_sidebar.html' %}
            </aside>
        </div>
    </div>
</div>

{% endblock %}
