<!-- ============================================================
     邮件模板 — 订阅确认页
     =======================
     用户点击订阅链接后，系统发送此邮件要求二次确认。
     邮件内含确认按钮，点击后完成订阅流程。

     Template: mail/verify_subscription.html
     Context:
       up_name   — UP 主昵称
       confirm_url — 确认订阅的回调链接
     ============================================================ -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>确认订阅</title></head>
<body style="margin:0;padding:0;background:#0f0d1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table role="presentation" style="width:100%;max-width:600px;margin:0 auto;padding:40px 20px">
<tr><td style="text-align:center;padding-bottom:24px">
<span style="font-size:28px">📺</span>
<h1 style="color:#e8edf5;font-size:20px;font-weight:500;margin:12px 0 0">确认订阅通知</h1>
</td></tr>
<tr><td style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:32px">
<p style="color:rgba(255,255,255,0.6);font-size:14px;line-height:1.7;margin:0 0 20px">
{% if to_name %}{{ to_name }}，您好！<br>{% endif %}
您已申请订阅 <strong style="color:#e8edf5">{{ up_name }}</strong> 的新视频邮件通知。
请点击下方按钮确认订阅：
</p>
<table role="presentation" style="width:100%"><tr><td style="text-align:center">
<a href="{{ verify_url }}" style="display:inline-block;padding:12px 32px;background:rgba(255,107,157,0.15);border:1px solid rgba(255,107,157,0.3);border-radius:12px;color:#ff8aae;font-size:14px;text-decoration:none;font-weight:500">确认订阅</a>
</td></tr></table>
<p style="color:rgba(255,255,255,0.35);font-size:12px;line-height:1.6;margin:24px 0 0">
如果无法点击上方按钮，请复制以下链接到浏览器：<br>
<a href="{{ verify_url }}" style="color:rgba(255,107,157,0.5);word-break:break-all">{{ verify_url }}</a>
</p>
</td></tr>
<tr><td style="text-align:center;padding:24px 0 0">
<p style="color:rgba(255,255,255,0.2);font-size:12px">
如非本人操作，请忽略此邮件。<br>
<a href="{{ unsubscribe_url }}" style="color:rgba(255,255,255,0.25)">取消订阅</a>
</p>
</td></tr>
</table>
</body>
</html>
