{% extends 'base.html' %}
{% block title %}汇率走势 - Hoshino{% endblock %}
{% block content %}

<div class="page-header">
    <div class="container">
        <div style="display:flex; align-items:center; gap:12px; justify-content:center; flex-wrap:wrap">
            <a href="{{ url_for('price.index') }}" style="font-size:14px"> 返回看板</a>
            <h1 style="font-size:24px; margin:0">实时汇率走势</h1>
        </div>
    </div>
</div>

<section style="padding-bottom:60px">
    <div class="container">
        <!-- 天数切换 -->
        <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:center">
            {% for d in [7, 14, 30, 90, 180] %}
            <a href="{{ url_for('price.rates_page', days=d) }}"
               class="tool-tab {% if days == d %}active{% endif %}">{{ d }}天</a>
            {% endfor %}
        </div>

        <!-- ECharts 容器 -->
        <div id="rateChart" style="width:100%; height:480px; padding:10px"></div>

        <!-- 当前汇率卡片 -->
        <div style="margin-top:24px; display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px">
            {% for c in ['USD', 'EUR', 'GBP'] %}
            <div class="price-card" style="padding:16px; text-align:center">
                <div style="font-size:13px; margin-bottom:4px">{{ c }}/CNY</div>
                <div id="latest-{{ c }}" style="font-size:28px; font-weight:700">--</div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
var chartDom = document.getElementById('rateChart');
var myChart = echarts.init(chartDom);

var colors = { 'USD': '#6c42d1', 'EUR': '#3dd68c', 'GBP': '#f0a030' };
var currencyNames = { 'USD': '美元', 'EUR': '欧元', 'GBP': '英镑' };

function loadRates() {
    var days = new URLSearchParams(location.search).get('days') || '90';
    fetch('{{ url_for("price.api_rates") }}?days=' + days)
        .then(function(r){ return r.json(); })
        .then(function(data) {
            var series = [];
            var allDates = [];

            data.rates.forEach(function(rate) {
                rate.history.forEach(function(h) {
                    if (allDates.indexOf(h.date) === -1) allDates.push(h.date);
                });
            });
            allDates.sort();

            data.rates.forEach(function(rate) {
                var values = allDates.map(function(d) {
                    var found = rate.history.find(function(h){ return h.date === d; });
                    return found ? found.rate : null;
                });
                series.push({
                    name: currencyNames[rate.currency] || rate.currency,
                    type: 'line',
                    data: values,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 4,
                    lineStyle: { width: 2 },
                    itemStyle: { color: colors[rate.currency] || '#6c42d1' },
                });

                // 更新最新汇率卡片
                var last = rate.history[rate.history.length - 1];
                if (last) {
                    var el = document.getElementById('latest-' + rate.currency);
                    if (el) el.textContent = last.rate.toFixed(4);
                }
            });

            myChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        var s = '<strong>' + params[0].axisValue + '</strong><br>';
                        params.forEach(function(p) {
                            if (p.value !== null) {
                                var color = p.color;
                                s += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';margin-right:6px"></span>';
                                s += p.seriesName + ': <strong>' + p.value.toFixed(4) + '</strong><br>';
                            }
                        });
                        return s;
                    }
                },
                legend: {
                    data: data.rates.map(function(r){ return currencyNames[r.currency] || r.currency; }),
                    textStyle: { color: '#aaa' },
                },
                grid: { left: '6%', right: '5%', bottom: '10%', top: '12%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: allDates,
                    axisLabel: { color: '#888', fontSize: 11 },
                    axisLine: { lineStyle: { color: '#333' } },
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#888', fontSize: 11 },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
                },
                series: series,
            });
        });
}

loadRates();
window.addEventListener('resize', function(){ myChart.resize(); });
</script>

{% endblock %}
