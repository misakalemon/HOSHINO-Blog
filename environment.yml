# HOSHINO Blog Conda 环境配置
# 创建环境：conda env create -f environment.yml
# 更新环境：conda env update -f environment.yml
# 导出环境：conda env export --no-builds > environment.yml

name: hoshino-blog

channels:
  - conda-forge
  - defaults

dependencies:
  # --- Python 基础 ---
  - python>=3.12,<3.13

  # --- Web 框架 ---
  - flask==3.1.0
  - werkzeug==3.1.8
  - jinja2==3.1.6
  - itsdangerous==2.2.0
  - blinker==1.9.0

  # --- 数据库 ---
  - sqlalchemy==2.0.50
  - flask-sqlalchemy==3.1.1
  - pymysql==1.2.0
  - flask-migrate>=4.0

  # --- 认证 ---
  - flask-login==0.6.3

  # --- 表单 ---
  - wtforms==3.2.1
  - flask-wtf==1.2.2
  - email-validator==2.3.0

  # --- 图片处理 ---
  - pillow==11.1.0

  # --- 压缩 ---
  - flask-compress==1.24
  - brotli==1.2.0
  - backports.zstd==1.5.0

  # --- 环境变量 ---
  - python-dotenv==1.1.0

  # --- Markdown ---
  - markdown==3.7
  - pygments==2.19.1

  # --- Redis 缓存 ---
  - redis-py==5.2.1

  # --- 定时任务 ---
  - apscheduler==3.11.0

  # --- HTML 清理 ---
  - bleach>=6.0

  # --- 爬虫 ---
  - requests>=2.28
  - curl-cffi==0.15.0
  - beautifulsoup4==4.12.2
  - lxml==4.9.3

  # --- 生产服务器 ---
  - waitress==3.0.2

  # --- pip 安装（conda-forge 未打包或版本滞后的包）---
  - pip
  - pip:
    - selenium==4.29.0
    - bilibili-api-python>=17.0.0
    - qrcode[pil]>=7.4
    - Eel>=0.18